<section id="skills" class="section-shell">
  <div class="section-heading reveal-up">
    <p>Skills</p>
    <h2>Technology Stack</h2>
  </div>

  <div class="skills-grid">
    @for (group of skills; track group.category) {
      <article class="skill-group reveal-up delay-1">
        <h3>{{ group.category }}</h3>
        <div class="tags">
          @for (item of group.items; track item) {
            <app-chip-badge [label]="item" [active]="true"></app-chip-badge>
          }
        </div>
      </article>
    }
  </div>
</section>
